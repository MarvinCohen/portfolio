    p1_html: "Je suis <strong>développeur web</strong>, spécialisé en <strong>Ruby on Rails</strong>. J'aime construire des applications complètes, de la modélisation des données jusqu'au déploiement en production."
    p2_html: "Après une formation intensive au <strong>Wagon</strong>, j'ai conçu et mis en ligne mes propres projets, comme Noctilio, et travaillé en équipe sur des applications plus ambitieuses comme Teams Up. J'attache de l'importance à un <strong>code clair, testé et bien commenté</strong>."
