    noctilio:
      badge: "Solo"
      tagline: "Histoires pour enfants générées par IA"
      desc: "Application qui génère des histoires personnalisées pour enfants (texte et illustration) via l'IA, selon le profil de l'enfant. Génération en tâche de fond, système de badges et déploiement en production."
      role: "Conception et développement de A à Z, en solo : modélisation, services IA, jobs en arrière-plan, interface et mise en production."
      context: "Mon premier projet personnel après la formation Le Wagon, conçu et déployé seul jusqu'en production."
      features:
        - "Génération de texte et d'illustration par IA selon le profil de l'enfant"
        - "Mode interactif où l'enfant oriente la suite de l'histoire"
        - "Génération en tâche de fond avec suivi du statut en temps réel"
        - "Salle des trophées avec 37 badges et système d'XP"
    teams_up:
      badge: "Équipe"
      tagline: "Mise en relation de sportifs amateurs"
      desc: "Plateforme pour créer et rejoindre des matchs, former des équipes et tchatter en temps réel. Projet collaboratif à 4 développeurs avec chat live, géolocalisation des terrains et application installable."
      role: "À COMPLÉTER : décris précisément ce que tu as développé sur ce projet d'équipe (modèles, pages ou fonctionnalités dont tu étais responsable)."
      context: "Projet de groupe réalisé à 4 développeurs, avec répartition des fonctionnalités et travail en équipe sur Git."
      features:
        - "Création et recherche de matchs par sport, niveau, ville et date"
        - "Chat en temps réel par match, par équipe et en privé"
        - "Recherche de terrains par géolocalisation sur carte"
        - "Application installable (PWA) avec notifications"
    biche:
      badge: "Client"
      tagline: "Réservation et espace cliente, atelier beauté"
      desc: "Application mobile-first pour une professionnelle des extensions de cils à Bordeaux : prise de rendez-vous en ligne, espace cliente (fidélité, historique, messagerie) et boutique. Conçue à partir des maquettes du studio."
      role: "Développement complet de l'application pour une cliente réelle, à partir de ses maquettes : prise de rendez-vous, espace cliente et boutique."
      context: "Projet client pour une professionnelle des extensions de cils à Bordeaux, à partir de maquettes fournies par le studio."
      features:
        - "Réservation en ligne en plusieurs étapes avec créneaux dynamiques"
        - "Espace cliente : fidélité, historique des soins, messagerie"
        - "Boutique en ligne et cartes cadeaux"
        - "Interface mobile-first fidèle aux maquettes du studio"
